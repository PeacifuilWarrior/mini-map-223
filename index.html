<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Выбор точки доставки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
    }
    #map {
      height: calc(100% - 64px);
      width: 100%;
    }
    .bar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      box-sizing: border-box;
      background: #fff;
    }
    button {
      width: 100%;
      max-width: 420px;
      height: 48px;
      border: 0;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="bar">
    <button id="sendBtn">Подтвердить точку</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const map = L.map("map").setView([51.831711, 9.447659], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let marker = null;
    let selected = null;

    map.on("click", function (e) {
      const { lat, lng } = e.latlng;
      selected = { lat: lat, lon: lng };

      if (marker) {
        marker.setLatLng([lat, lng]);
      } else {
        marker = L.marker([lat, lng]).addTo(map);
      }
    });

    document.getElementById("sendBtn").addEventListener("click", function () {
      if (!selected) {
        alert("Сначала выберите точку на карте");
        return;
      }

      tg.sendData(JSON.stringify(selected));
      tg.close();
    });
  </script>
</body>
</html>
